name: Run Trading Bot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 🔥 upgrade

      - name: Set up Python
        uses: actions/setup-python@v5   # 🔥 upgrade
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy ccxt

      - name: Run bot
        run: |
          python main.py
